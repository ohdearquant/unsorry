name: agent-lint

on:
  pull_request:

jobs:
  agent-lint:
    # SPEC-007-A quality bar: shellcheck-clean, bash -n clean, hermetic
    # self-test green (temp dirs + injected clock; no network, no claude).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck
        run: shellcheck swarm/agent.sh swarm/supervise.sh
      - name: bash syntax check
        run: bash -n swarm/agent.sh && bash -n swarm/supervise.sh
      - name: agent self-test
        run: ./swarm/agent.sh --self-test
      - name: supervisor self-test
        run: ./swarm/supervise.sh --self-test
