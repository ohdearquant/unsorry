name: gate-a

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  # Lake's mathlib cache archives live outside .lake by default
  # ($HOME/.cache/mathlib). Put them under .lake so the Namespace cache volume
  # persists both the unpacked oleans and the .ltar archives.
  MATHLIB_CACHE_DIR: ${{ github.workspace }}/.lake/mathlib-cache

concurrency:
  group: gate-a-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Always runs and always reports — a path-filtered required check would
  # leave non-Lean PRs permanently blocked on an "expected" status
  # (SPEC-006-B). Detection is a job so `gate-a` itself can short-circuit.
  detect:
    runs-on: ubuntu-latest
    outputs:
      lean: ${{ steps.filter.outputs.lean }}
      active: ${{ steps.filter.outputs.active }}
      archive: ${{ steps.filter.outputs.archive }}
      profile: ${{ steps.profile.outputs.name }}
      volume: ${{ steps.profile.outputs.volume }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            lean:
              - 'library/**'
              - 'goals/**/*.lean'
              - 'packages/unsorry-archive-*/**'
              - 'lakefile.toml'
              - 'lake-manifest.json'
              - 'lean-toolchain'
              - 'AxiomAudit/**'
              - 'AuditFixtures/**'
              - 'tools/gate_a/**'
              - '.github/workflows/gate-a.yml'
            active:
              - 'library/**'
              - 'goals/**/*.lean'
              - 'lakefile.toml'
              - 'lake-manifest.json'
              - 'lean-toolchain'
              - 'AxiomAudit/**'
              - 'AuditFixtures/**'
              - 'tools/gate_a/**'
              - '.github/workflows/gate-a.yml'
            archive:
              - 'packages/unsorry-archive-*/**'
            # The ADR-033 olean-invalidating full-replay triggers: a change here
            # forces gate-a to replay the WHOLE library (heavy), so it gets its
            # own heavier Namespace profile. Narrowed to exactly the
            # olean-invalidating paths (FULL_REPLAY_PATHS in parallel_modules.py):
            # #792 made tools/gate_a/** and gate-a.yml run an INCREMENTAL replay
            # (they change no olean), so they no longer select the heavy profile
            # (ADR-048 Phase 2).
            infra:
              - 'lean-toolchain'
              - 'lakefile.toml'
              - 'lakefile.lean'
              - 'lake-manifest.json'
      # Route by replay workload (ADR-048 Phase 2): a routine proof PR AND a push
      # to main now replay INCREMENTALLY (light) -> namespace-profile-unsorry-1
      # (4 GB). Only an olean-invalidating change (toolchain/lakefile/manifest)
      # forces a FULL replay (heavy) → namespace-profile-unsorry-2 (16 GB), so a
      # rare slow full-replay never hogs the frequent proof runner.
      #
      # Transition note: namespace-profile-unsorry-2 is now used ONLY by forced
      # full-replay (toolchain/dep) runs. If the operator retires unsorry-2,
      # point those runs at unsorry-1 with the small-chunk path
      # (UNSORRY_REPLAY_CHUNK, see the replay job and SPEC-048-B) — nothing on the
      # routine path depends on the 16 GB profile.
      - id: profile
        run: |
          if [ "${{ steps.filter.outputs.infra }}" = "true" ]; then
            name=namespace-profile-unsorry-2
          else
            name=namespace-profile-unsorry-1
          fi
          echo "name=$name" >> "$GITHUB_OUTPUT"
          # Failsafe (ADR-046): the .lake cache volume engages ONLY on a Namespace
          # profile. If the runner is ever changed to a non-Namespace one, volume
          # is false and the gate falls back to lean-action's GitHub mathlib cache
          # — nothing references a volume that isn't there.
          case "$name" in
            namespace-*) echo "volume=true"  >> "$GITHUB_OUTPUT" ;;
            *)           echo "volume=false" >> "$GITHUB_OUTPUT" ;;
          esac

  gate_a_prepare:
    name: gate-a-prepare
    needs: detect
    # Namespace managed (ephemeral) runner, chosen by detect.profile (ADR-048
    # Phase 2):
    #   namespace-profile-unsorry-1 (4 GB) — routine proof PRs AND push to main,
    #                                 both incremental + light.
    #   namespace-profile-unsorry-2 (16 GB) — only an olean-invalidating change
    #                                 (toolchain/lakefile/manifest) that forces a
    #                                 FULL replay, so the rare slow full replay
    #                                 runs in its own pool and never blocks the
    #                                 frequent proof PRs on unsorry-1.
    # The scheduled gate-a-full-replay workflow runs the full backstop on the
    # routine profile with a small UNSORRY_REPLAY_CHUNK.
    # This prepare job warms/restores the Lean cache, generates binding modules,
    # and runs the cheap authoritative checks once before the heavy audit/replay
    # jobs start in parallel.
    if: needs.detect.outputs.lean == 'true'
    runs-on: ${{ needs.detect.outputs.profile }}
    # 45 min, not 30: a COLD library build (~21 min and growing — no warm
    # `.lake/build` cache, e.g. first run on a new cache prefix after a
    # toolchain/mathlib bump) plus the cheap checks overran the old 30-min cap
    # and the job was killed (#573). The ADR-045 cache keeps the warm path to
    # ~minutes; this only adds headroom for the rare cold path.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # ADR-045: persist the local UnsorryLibrary oleans (.lake/build) across
      # runs so `lake build UnsorryLibrary` is incremental — only changed
      # modules recompile instead of the whole library cold-building (~16-21 min)
      # in every job. The key invalidates on any toolchain / mathlib / lakefile
      # change (forcing a full cold rebuild); otherwise restore-keys restores the
      # most recent oleans. Same gate-a run: prepare saves under the commit sha
      # and the audit/replay jobs (which `need` prepare) restore that exact key,
      # so the library builds ONCE per run, not three times. Soundness is
      # unchanged — Lake's content-hash traces recompile any changed source, and
      # the axiom audit + leanchecker kernel replay still validate every olean
      # that reaches main (incremental on the pushed diff, plus the scheduled
      # gate-a-full-replay backstop — ADR-048 Phase 2), cached or not.
      # Namespace .lake cache volume (ADR-046): persists mathlib + the local
      # oleans on the runner's attached disk across jobs and runs, so `lake exe
      # cache get` finds mathlib present (no ~3.5-min GitHub-cache restore) and
      # the library oleans survive between prepare/audit/replay. Engages ONLY on
      # a Namespace profile; soft-fails (continue-on-error) if no volume is
      # attached, falling back to the GitHub caches below.
      - name: Namespace .lake cache volume
        if: needs.detect.outputs.volume == 'true'
        id: ns_lake_cache
        continue-on-error: true
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1.4.3
        with:
          path: ${{ github.workspace }}/.lake

      - name: Namespace .lake cache diagnostics
        if: needs.detect.outputs.volume == 'true'
        run: |
          echo "nscloud cache-hit=${{ steps.ns_lake_cache.outputs.cache-hit }}"
          du -sh .lake .lake/packages .lake/build 2>/dev/null || true

      # GitHub-cache fallback for the local oleans. Keep this active even on
      # Namespace: the volume is shared and keyless, while ADR-045's cache is
      # exact to this commit so audit/replay can restore prepare's build and
      # skip the duplicate library build safely.
      - name: Cache local Lake build (.lake/build) — incremental library (ADR-045)
        id: lake_build_cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-${{ github.sha }}
          restore-keys: |
            lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-

      # ADR-018: goal statements are create-only — the pin against history.
      # Every other layer (binding regeneration, Gate B shas) derives from
      # goals/<id>.lean in THIS tree, so same-PR consistent tampering passes
      # them all (#190 CRITICAL). Runs before the build: cheap, and a
      # tampering PR must die fast. Any goals/*.lean change sets detect.lean,
      # so the gate cannot be short-circuited around.
      - name: Goal statements are create-only (ADR-018)
        if: github.event_name == 'pull_request' && needs.detect.outputs.active == 'true'
        run: |
          python3 -m tools.gate_a.check_goal_immutability \
            --base "${{ github.event.pull_request.base.sha }}"

      - name: Build (lean-action, mathlib binary cache)
        if: needs.detect.outputs.active == 'true'
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          # On a warm Namespace .lake volume, mathlib is already resident. If the
          # volume misses/errors, fall back to lean-action's GitHub cache.
          use-github-cache: ${{ needs.detect.outputs.volume != 'true' || steps.ns_lake_cache.outputs.cache-hit != 'true' }}
          build-args: "UnsorryGoals"

      # ADR-011 statement binding: Gate A REGENERATES the binding obligation for
      # every proved goal from the goal's own statement, so a contributor can
      # neither weaken nor omit it. The --wfail build below then type-checks the
      # obligations — a proof of a weakened/vacuous statement under the goal's
      # name fails to inhabit the goal type and goes red. (#64 class.)
      - name: Generate statement-binding obligations
        if: needs.detect.outputs.active == 'true'
        run: python3 -m tools.gate_a.check_statement_binding generate .

      - name: Library build — zero-warning bar (--wfail)
        if: needs.detect.outputs.active == 'true'
        run: lake build UnsorryLibrary --wfail

      - name: Audit self-test (gate cannot rot silently)
        if: needs.detect.outputs.active == 'true'
        run: ./tools/gate_a/test_audit.sh

      # Authoritative for the autoImplicit vector: the build/audit/leanchecker
      # all PASS a vacuous theorem enabled by `set_option autoImplicit true`
      # (it is sound, just meaningless), so for this vector the scan IS the bar.
      # Whole-file + whitespace-collapsed, so line-splitting cannot evade it
      # (W3 red-team PR #64). Self-tested by tools/gate_a/tests/.
      - name: Forbidden elaboration options in library
        if: needs.detect.outputs.active == 'true'
        run: python3 -m tools.gate_a.check_library_options library

      # Archive-package validation moved to its own job (gate-a-archive): each
      # archive package is a separate Lake project that leanchecker-replays its
      # own mathlib image, which OOM'd when run inside this job's headroom (#764).

      - name: Textual lint on library diff (belt only — the audit is the bar)
        if: github.event_name == 'pull_request' && needs.detect.outputs.active == 'true'
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          added=$(git diff "$base"...HEAD -- library/ | grep '^+' | grep -v '^+++' || true)
          if echo "$added" | grep -nE '\b(sorry|admit|sorryAx|native_decide|axiom|unsafe|implemented_by|extern)\b'; then
            echo "::error::forbidden token added under library/ (see lines above)"
            exit 1
          fi

  gate_a_audit:
    name: gate-a-audit
    needs: [detect, gate_a_prepare]
    if: needs.detect.outputs.active == 'true'
    runs-on: ${{ needs.detect.outputs.profile }}
    # 45 min, not 30: this job also does the cold library build (~21 min) before
    # its incremental audit; the old 30-min cap killed it on a cold cache (#567).
    # See gate-a-prepare and ADR-045.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # ADR-045: restore the library oleans gate-a-prepare just built (exact-key
      # hit on the commit sha) so this job's library build is a near-no-op rather
      # than a second cold ~16-21 min rebuild. See gate-a-prepare for the full
      # rationale and the soundness argument.
      # Namespace .lake cache volume (ADR-046): persists mathlib + the local
      # oleans on the runner's attached disk across jobs and runs, so `lake exe
      # cache get` finds mathlib present (no ~3.5-min GitHub-cache restore) and
      # the library oleans survive between prepare/audit/replay. Engages ONLY on
      # a Namespace profile; soft-fails (continue-on-error) if no volume is
      # attached, falling back to the GitHub caches below.
      - name: Namespace .lake cache volume
        if: needs.detect.outputs.volume == 'true'
        id: ns_lake_cache
        continue-on-error: true
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1.4.3
        with:
          path: ${{ github.workspace }}/.lake

      - name: Namespace .lake cache diagnostics
        if: needs.detect.outputs.volume == 'true'
        run: |
          echo "nscloud cache-hit=${{ steps.ns_lake_cache.outputs.cache-hit }}"
          du -sh .lake .lake/packages .lake/build 2>/dev/null || true

      # GitHub-cache fallback for the local oleans. Keep this active even on
      # Namespace: the volume is shared and keyless, while ADR-045's cache is
      # exact to this commit so audit/replay can restore prepare's build and
      # skip the duplicate library build safely.
      - name: Cache local Lake build (.lake/build) — incremental library (ADR-045)
        id: lake_build_cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-${{ github.sha }}
          restore-keys: |
            lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-

      - name: Build (lean-action, mathlib binary cache)
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          # On a warm Namespace .lake volume, mathlib is already resident. If the
          # volume misses/errors, fall back to lean-action's GitHub cache.
          use-github-cache: ${{ needs.detect.outputs.volume != 'true' || steps.ns_lake_cache.outputs.cache-hit != 'true' }}
          build-args: "UnsorryGoals"

      - name: Generate statement-binding obligations
        run: python3 -m tools.gate_a.check_statement_binding generate .

      - name: Library build — zero-warning bar (--wfail)
        # Skip when the .lake/build cache hit on the exact commit-sha key:
        # gate-a-prepare already built and --wfail-checked these exact oleans this
        # run, and the axiom audit / leanchecker only LOAD oleans (`lake exe` /
        # `lake env`, never a library `lake build` — axiom_audit is a standalone
        # lean_exe, leanchecker runs under `lake env`), so rebuilding here was pure
        # waste (~3.5 min/job, the gate's biggest constant cost). Self-healing:
        # on a cache miss the build runs. Soundness unchanged — leanchecker
        # re-checks every olean it loads against the kernel regardless of origin.
        if: steps.lake_build_cache.outputs.cache-hit != 'true'
        run: lake build UnsorryLibrary --wfail

      # Incremental on PRs AND on push to main (ADR-048 Phase 2): audit only the
      # changed library modules plus their reverse-import closure, and changed
      # goals. Unchanged declarations were already audited on main. BASE_SHA is
      # github.event.before on a push (the previous main tip — diff = exactly the
      # merged change), pull_request.base.sha on a PR, empty otherwise. A zero-SHA
      # (first push / branch creation) or empty BASE_SHA runs the FULL audit as
      # the backstop; gate/tooling changes also fall back to full (forces_full_audit).
      # Serialized (--jobs 1): each axiom_audit process holds a full mathlib
      # image (~6-7 GB).
      - name: Axiom audit (authoritative)
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event_name == 'push' && github.event.before || '') }}
        run: |
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_SHA" ]; then
            python3 -m tools.gate_a.parallel_modules audit --jobs 1 --output axiom-report.json
          else
            python3 -m tools.gate_a.parallel_modules audit --jobs 1 --output axiom-report.json --base "$BASE_SHA"
          fi

      - name: Upload axiom footprint artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: axiom-report
          path: axiom-report.json

      - name: Sticky footprint comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          {
            echo '<!-- axiom-report -->'
            echo '### Axiom footprint (Gate A)'
            echo '```json'
            cat axiom-report.json
            echo '```'
          } > comment.md
          existing=$(gh api "repos/${{ github.repository }}/issues/$PR/comments" \
            --jq '.[] | select(.body | startswith("<!-- axiom-report -->")) | .id' | head -1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$existing" -F body=@comment.md >/dev/null
          else
            gh api "repos/${{ github.repository }}/issues/$PR/comments" -F body=@comment.md >/dev/null
          fi

  gate_a_replay:
    name: gate-a-replay
    needs: [detect, gate_a_prepare]
    if: needs.detect.outputs.active == 'true'
    runs-on: ${{ needs.detect.outputs.profile }}
    # 120m (not 60m): a FULL replay (toolchain/dep change, or the scheduled
    # backstop) is serial on a memory-bound runner and needs the headroom to
    # finish rather than time out (ADR-047). Incremental PR and push-to-main
    # replays finish in seconds (ADR-048 Phase 2). Matches ADR-047/#748.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # ADR-045: restore the library oleans gate-a-prepare just built (exact-key
      # hit on the commit sha) so this job's library build is a near-no-op rather
      # than a third cold ~16-21 min rebuild. See gate-a-prepare for the full
      # rationale and the soundness argument.
      # Namespace .lake cache volume (ADR-046): persists mathlib + the local
      # oleans on the runner's attached disk across jobs and runs, so `lake exe
      # cache get` finds mathlib present (no ~3.5-min GitHub-cache restore) and
      # the library oleans survive between prepare/audit/replay. Engages ONLY on
      # a Namespace profile; soft-fails (continue-on-error) if no volume is
      # attached, falling back to the GitHub caches below.
      - name: Namespace .lake cache volume
        if: needs.detect.outputs.volume == 'true'
        id: ns_lake_cache
        continue-on-error: true
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1.4.3
        with:
          path: ${{ github.workspace }}/.lake

      - name: Namespace .lake cache diagnostics
        if: needs.detect.outputs.volume == 'true'
        run: |
          echo "nscloud cache-hit=${{ steps.ns_lake_cache.outputs.cache-hit }}"
          du -sh .lake .lake/packages .lake/build 2>/dev/null || true

      # GitHub-cache fallback for the local oleans. Keep this active even on
      # Namespace: the volume is shared and keyless, while ADR-045's cache is
      # exact to this commit so audit/replay can restore prepare's build and
      # skip the duplicate library build safely.
      - name: Cache local Lake build (.lake/build) — incremental library (ADR-045)
        id: lake_build_cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lake/build
          key: lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-${{ github.sha }}
          restore-keys: |
            lake-build-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}-

      # Kernel replay (leanchecker) holds ~all of mathlib resident per process;
      # as the library grows its peak RSS crept past the 7 GB standard-runner
      # limit and the replay step took SIGTERM/143 (#370, the euclid recompose —
      # ~4 min in, axiom audit clean, so resource exhaustion not a bad proof).
      # Chunk size does not move the ceiling (the cost is the mathlib image, not
      # the few library oleans in a chunk), so give leanchecker swap to page cold
      # regions instead of OOM. The job uses ~10 of its 60 min, so paging is well
      # within budget. /mnt has tens of GB free on GitHub-hosted ubuntu runners.
      - name: Add swap headroom for leanchecker (best-effort)
        # Best-effort: GitHub-hosted runners allow swapon, so leanchecker pages
        # cold mathlib regions instead of OOMing on a constrained runner.
        # Namespace managed runners disallow swapon ("Operation not permitted");
        # there the incremental scope (routine PRs + push to main, ADR-048 Phase
        # 2) keeps the replay small, and a forced FULL replay routes to the 16 GB
        # unsorry-2 profile (or unsorry-1 with a small UNSORRY_REPLAY_CHUNK), so
        # any failure in this step is a warning, not a gate failure.
        run: |
          if sudo fallocate -l 12G /mnt/swapfile \
               || sudo dd if=/dev/zero of=/mnt/swapfile bs=1M count=12288; then
            sudo chmod 600 /mnt/swapfile
            sudo mkswap /mnt/swapfile
            if sudo swapon /mnt/swapfile; then
              echo "--- memory after adding swap ---"
              free -h
            else
              echo "::warning::swapon not permitted on this runner — continuing on RAM + serial replay"
              sudo rm -f /mnt/swapfile || true
            fi
          else
            echo "::warning::could not allocate a swapfile — continuing on RAM + serial replay"
          fi

      - name: Build (lean-action, mathlib binary cache)
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          # On a warm Namespace .lake volume, mathlib is already resident. If the
          # volume misses/errors, fall back to lean-action's GitHub cache.
          use-github-cache: ${{ needs.detect.outputs.volume != 'true' || steps.ns_lake_cache.outputs.cache-hit != 'true' }}
          build-args: "UnsorryGoals"

      - name: Generate statement-binding obligations
        run: python3 -m tools.gate_a.check_statement_binding generate .

      - name: Library build — zero-warning bar (--wfail)
        # Skip when the .lake/build cache hit on the exact commit-sha key:
        # gate-a-prepare already built and --wfail-checked these exact oleans this
        # run, and the axiom audit / leanchecker only LOAD oleans (`lake exe` /
        # `lake env`, never a library `lake build` — axiom_audit is a standalone
        # lean_exe, leanchecker runs under `lake env`), so rebuilding here was pure
        # waste (~3.5 min/job, the gate's biggest constant cost). Self-healing:
        # on a cache miss the build runs. Soundness unchanged — leanchecker
        # re-checks every olean it loads against the kernel regardless of origin.
        if: steps.lake_build_cache.outputs.cache-hit != 'true'
        run: lake build UnsorryLibrary --wfail

      # Incremental on PRs AND on push to main (ADR-033 + ADR-048 Phase 2):
      # replay only the changed library modules and their reverse-import closure
      # — the rest are byte-identical to and already verified on main. BASE_SHA is
      # github.event.before on a push (the previous main tip — diff = exactly the
      # merged change), pull_request.base.sha on a PR, empty otherwise. A zero-SHA
      # (first push / branch creation) or empty BASE_SHA runs a FULL replay as the
      # backstop; the tool also falls back to full if the diff can't be computed or
      # an olean-invalidating file changed. The scheduled gate-a-full-replay
      # workflow is the defense-in-depth full backstop (ADR-048 Phase 2).
      # Replay is intentionally serial: the tool accepts --jobs for CLI symmetry
      # but reports effective jobs=1. A forced FULL replay routes to the 16 GB
      # profile; on a constrained runner set UNSORRY_REPLAY_CHUNK to a small value
      # (e.g. 6) so leanchecker's per-chunk peak fits (SPEC-048-B).
      - name: Kernel replay (leanchecker)
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event_name == 'push' && github.event.before || '') }}
        run: |
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_SHA" ]; then
            python3 -m tools.gate_a.parallel_modules replay --jobs 1
          else
            python3 -m tools.gate_a.parallel_modules replay --jobs 1 --base "$BASE_SHA"
          fi

  gate_a_archive:
    name: gate-a-archive
    needs: [detect]
    if: needs.detect.outputs.archive == 'true'
    runs-on: ${{ needs.detect.outputs.profile }}
    # Validates a changed archive package: packaging sanity (`lake build --wfail`)
    # + provenance/byte-identity (ADR-018, checked in gate-a-prepare). It does NOT
    # leanchecker-replay the archived proofs (ADR-048 verify-on-ingest) — they were
    # kernel-verified when active and are byte-identical now — so it no longer needs
    # the 16 GB pin (#838, now superseded) or swap that the replay required (#764).
    # `lake build --wfail` fits the standard runner.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # Mount the Namespace volume so the archive packages' `lake exe cache get`
      # finds mathlib .ltar archives in the shared MATHLIB_CACHE_DIR (under .lake)
      # instead of re-downloading per package (ADR-046).
      - name: Namespace .lake cache volume
        if: needs.detect.outputs.volume == 'true'
        id: ns_lake_cache
        continue-on-error: true
        uses: namespacelabs/nscloud-cache-action@15799a6b54e5765f85b2aac25b3f0df43ed571c0 # v1.4.3
        with:
          path: ${{ github.workspace }}/.lake

      # Archive packages build their own mathlib, so just install the toolchain.
      - name: Set up Lean toolchain
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9 # v1.5.0
        with:
          build: "false"
          test: "false"
          lint: "false"
          use-mathlib-cache: "false"
          use-github-cache: "false"

      # BASE_SHA mirrors the audit/replay jobs: pull_request.base.sha on a PR,
      # github.event.before on a push to main (validate only archives the push
      # changed — usually a no-op). The zero-SHA (first push / branch creation) or
      # an empty BASE_SHA falls back to validating ALL archive packages, so we
      # never rely on implicit `git diff <zero-sha>` behaviour for a soundness path.
      - name: Validate changed archive packages (ADR-041)
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event_name == 'push' && github.event.before || '') }}
        run: |
          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_SHA" ]; then
            python3 -m tools.gate_a.archive_packages validate-changed
          else
            python3 -m tools.gate_a.archive_packages validate-changed --base "$BASE_SHA"
          fi

  gate-a:
    needs: [detect, gate_a_prepare, gate_a_audit, gate_a_replay, gate_a_archive]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate Gate A result
        env:
          LEAN_RELEVANT: ${{ needs.detect.outputs.lean }}
          ACTIVE_RELEVANT: ${{ needs.detect.outputs.active }}
          PREPARE_RESULT: ${{ needs.gate_a_prepare.result }}
          AUDIT_RESULT: ${{ needs.gate_a_audit.result }}
          REPLAY_RESULT: ${{ needs.gate_a_replay.result }}
          ARCHIVE_RELEVANT: ${{ needs.detect.outputs.archive }}
          ARCHIVE_RESULT: ${{ needs.gate_a_archive.result }}
        run: |
          set -euo pipefail
          if [ "$LEAN_RELEVANT" != "true" ]; then
            echo "No Lean-relevant paths touched — gate-a passes vacuously."
            exit 0
          fi

          failed=0
          pairs="gate-a-prepare:$PREPARE_RESULT"
          if [ "$ACTIVE_RELEVANT" = "true" ]; then
            pairs="$pairs gate-a-audit:$AUDIT_RESULT gate-a-replay:$REPLAY_RESULT"
          fi
          if [ "$ARCHIVE_RELEVANT" = "true" ]; then
            pairs="$pairs gate-a-archive:$ARCHIVE_RESULT"
          fi

          for pair in $pairs; do
            job="${pair%%:*}"
            result="${pair#*:}"
            if [ "$result" != "success" ]; then
              echo "::error::$job concluded with $result"
              failed=1
            fi
          done
          exit "$failed"
