name: gate-b

on:
  pull_request:
  push:
    branches: [main]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      gate_b: ${{ steps.filter.outputs.gate_b }}
      aisp: ${{ steps.filter.outputs.aisp }}
      admitted: ${{ steps.admission.outputs.admitted }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            gate_b:
              - '.github/workflows/gate-b.yml'
              - 'tools/gate_b/**'
              - 'tools/archive/**'
              - 'tools/sourcing/**'
              - 'tools/llm_providers/**'
              - 'goals/**/*.aisp'
              - 'goals/**/*.lean'
              - 'translations/**/*.aisp'
              - 'decompositions/**/*.aisp'
              - 'library/index/**/*.aisp'
              - 'proof-runs/**/*.aisp'
              - 'swarm/**/*.aisp'
            aisp:
              - '.github/workflows/gate-b.yml'
              - 'goals/**/*.aisp'
              - 'translations/**/*.aisp'
              - 'decompositions/**/*.aisp'
              - 'library/index/**/*.aisp'
              - 'proof-runs/**/*.aisp'
              - 'swarm/**/*.aisp'
      - id: admission
        env:
          CREATED_AT: ${{ github.event.pull_request.created_at }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          python3 -m tools.repo.pr_admission env \
            --created-at "$CREATED_AT" \
            --head-ref "$HEAD_REF" \
            --title "$TITLE" >> "$GITHUB_OUTPUT"

  gate-b:
    # Required check: in-repo deterministic validator (ADR-003). Stdlib only;
    # pytest is the sole test-time dependency. The job always reports so branch
    # protection never waits on an "expected" required check, but docs/UI-only
    # PRs short-circuit before Python setup.
    needs: detect
    runs-on: ubuntu-latest
    steps:
      - name: Short-circuit (no Gate B-relevant paths)
        if: needs.detect.outputs.admitted != 'true' || needs.detect.outputs.gate_b != 'true'
        run: echo "No Gate B-relevant paths touched — gate-b passes vacuously."

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.gate_b == 'true'
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.gate_b == 'true'
        with:
          python-version: "3.12"
      - name: Install test dependency
        if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.gate_b == 'true'
        run: pip install pytest
      - name: Gate B test suite
        if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.gate_b == 'true'
        run: pytest tools/gate_b -q
      - name: Sourcing test suite (ADR-012 / ADR-035)
        if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.gate_b == 'true'
        # Stdlib only (absence grep + triviality probe use a mocked runner).
        run: pytest tools/sourcing -q
      - name: Archive planner test suite (ADR-041)
        if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.gate_b == 'true'
        run: pytest tools/archive -q
      - name: Validate repository tree
        if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.gate_b == 'true'
        run: python3 -m tools.gate_b validate .
      # Neither the targets-board nor the leaderboard `--check` is a PR gate
      # (ADR-036, #415): a generated artifact regenerated in every PR made
      # concurrent goal PRs conflict on it. Both are refreshed POST-MERGE — the
      # board by `targets-board.yml`, the leaderboard by `leaderboard.yml`.
      - name: LLM provider tests (ADR-025)
        if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.gate_b == 'true'
        # The OpenAI provider imports `requests`; the resolver tests are pure stdlib.
        run: |
          pip install -r tools/llm_providers/requirements.txt
          pytest tools/llm_providers -q

  aisp-advisory:
    # Advisory cross-check with the upstream generic AISP validator, pinned at
    # 0.3.0 (ADR-003). Never blocks: continue-on-error at the job level. The
    # swarm contract is validated strictly (a real, if non-blocking, signal); the
    # per-record loop is advisory-only and never reddens the check, because the
    # in-repo Gate B is the load-bearing validator and our coordination records
    # legitimately carry shapes newer than 0.3.0 (e.g. the ADR-024 ⟦Δ:Lesson⟧
    # block) that the pinned upstream rejects. Resolving that drift (upstream the
    # block or bump the pin) is tracked in issue #318.
    needs: detect
    if: needs.detect.outputs.admitted == 'true' && needs.detect.outputs.aisp == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # need the base commit to diff changed records
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Validate swarm contract
        run: npx --yes aisp-validator@0.3.0 validate swarm/protocol.aisp
      - name: Validate coordination records (advisory; changed-only; never reddens)
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event_name == 'push' && github.event.before || '') }}
        run: |
          set -uo pipefail
          # Scope to records CHANGED in this PR/push. Re-validating every immutable
          # proof-runs/*.aisp (thousands) on each run is what made this ~8 min; a PR
          # touches only a handful. Zero-SHA / missing base / shallow history falls
          # back to validating all (rare — first push).
          dirs=(goals translations decompositions library/index proof-runs)
          records=()
          if [ -n "$BASE_SHA" ] \
             && [ "$BASE_SHA" != "0000000000000000000000000000000000000000" ] \
             && git rev-parse -q --verify "${BASE_SHA}^{commit}" >/dev/null 2>&1; then
            while IFS= read -r -d '' f; do
              case "$f" in *.aisp) records+=("$f") ;; esac
            done < <(git diff -z --name-only --diff-filter=ACM "$BASE_SHA" HEAD -- "${dirs[@]}" 2>/dev/null)
          else
            echo "advisory: no usable base diff — validating all records"
            while IFS= read -r -d '' f; do records+=("$f"); done \
              < <(find "${dirs[@]}" -name '*.aisp' -type f -print0 2>/dev/null)
          fi
          if [ "${#records[@]}" -eq 0 ]; then
            echo "no changed coordination records — nothing to validate"
            exit 0
          fi
          npx --yes aisp-validator@0.3.0 --version >/dev/null 2>&1 || true  # warm npm cache once
          flagged=0
          for record in "${records[@]}"; do
            echo "::group::${record}"
            npx --yes aisp-validator@0.3.0 validate "${record}" || {
              flagged=$((flagged + 1))
              echo "  advisory: upstream validator flagged this record (ADR-003 / issue #318)"
            }
            echo "::endgroup::"
          done
          if [ "${flagged}" -gt 0 ]; then
            echo "advisory: ${flagged} of ${#records[@]} changed record(s) flagged by upstream aisp-validator@0.3.0 — non-blocking (ADR-003); see issue #318"
          fi
