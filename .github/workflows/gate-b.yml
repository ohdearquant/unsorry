name: gate-b

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gate-b:
    # Required check: in-repo deterministic validator (ADR-003). Stdlib only;
    # pytest is the sole test-time dependency.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install test dependency
        run: pip install pytest
      - name: Gate B test suite
        run: pytest tools/gate_b -q
      - name: Sourcing test suite (ADR-012 / ADR-035)
        # Stdlib only (absence grep + triviality probe use a mocked runner).
        run: pytest tools/sourcing -q
      - name: Validate repository tree
        run: python3 -m tools.gate_b validate .
      - name: Targets board in sync (ADR-012 / SPEC-012-A)
        # docs/targets.md is generated from goals + library/index; fail if it has
        # drifted (the guard that was specified but never wired — issue #377).
        run: python3 -m tools.sourcing.targets_board --check .
      - name: LLM provider tests (ADR-025)
        # The OpenAI provider imports `requests`; the resolver tests are pure stdlib.
        run: |
          pip install -r tools/llm_providers/requirements.txt
          pytest tools/llm_providers -q

  aisp-advisory:
    # Advisory cross-check with the upstream generic AISP validator, pinned at
    # 0.3.0 (ADR-003). Never blocks: continue-on-error at the job level. The
    # swarm contract is validated strictly (a real, if non-blocking, signal); the
    # per-record loop is advisory-only and never reddens the check, because the
    # in-repo Gate B is the load-bearing validator and our coordination records
    # legitimately carry shapes newer than 0.3.0 (e.g. the ADR-024 ⟦Δ:Lesson⟧
    # block) that the pinned upstream rejects. Resolving that drift (upstream the
    # block or bump the pin) is tracked in issue #318.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Validate swarm contract
        run: npx --yes aisp-validator@0.3.0 validate swarm/protocol.aisp
      - name: Validate coordination records (advisory; never reddens the check)
        run: |
          found=0 flagged=0
          while IFS= read -r -d '' record; do
            found=1
            echo "::group::${record}"
            npx --yes aisp-validator@0.3.0 validate "${record}" || {
              flagged=$((flagged + 1))
              echo "  advisory: upstream validator flagged this record (ADR-003 / issue #318)"
            }
            echo "::endgroup::"
          done < <(find goals translations decompositions library/index proof-runs \
                     -name '*.aisp' -type f -print0 2>/dev/null)
          if [ "${found}" -eq 0 ]; then
            echo "no coordination records on this tree — nothing to validate"
          elif [ "${flagged}" -gt 0 ]; then
            echo "advisory: ${flagged} record(s) flagged by upstream aisp-validator@0.3.0 — non-blocking (ADR-003); see issue #318"
          fi
