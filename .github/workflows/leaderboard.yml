# Keep the generated leaderboard artifacts up to date POST-MERGE (ADR-023 data
# model, refreshed under the ADR-036 / issue #415 post-merge generated-artifact
# model — same as targets-board.yml and proofs-visualisation.yml).
#
# The leaderboard (docs/leaderboard.md + .svg + docs/metrics/*.json) is
# generated from goals/ + library/index + proof-runs by `tools.leaderboard`.
# Regenerating it *in every PR* (the original #401 approach) reintroduced exactly
# the churn #415 removed for the board: every merged proof refreshes the
# leaderboard, so two concurrent goal PRs conflict on docs/leaderboard.*. So the
# leaderboard moves to the post-merge model: on every push to `main` that could
# change the underlying statistics it runs `--check`, and on drift it regenerates
# and commits the artifacts straight back to `main` as a single docs-only
# `[skip ci]` commit (the standard generated-artifact exception).
#
# The hand-authored docs/leaderboard.html browser surface fetches these generated
# JSON files at view time, so it is always consistent without being regenerated.
#
# Pushing the refresh to `main` needs an admin identity: the default
# GITHUB_TOKEN / github-actions[bot] cannot push to a branch protected by
# required status checks, and it cannot be granted a bypass (it is not a
# selectable actor in classic protection *or* rulesets). Because the rule has
# `enforce_admins: false`, an **admin** push bypasses the checks — so the push
# authenticates with a `REFRESH_TOKEN` secret (an admin PAT / GitHub App token,
# contents:write). When the secret is unset the workflow degrades to a
# report-only notice instead of failing red. See issue #417.

name: leaderboard

on:
  push:
    branches: [main]
    paths:
      - "goals/**"
      - "library/index/**"
      - "proof-runs/**"
      - "docs/metrics/contributor-aliases.json"
      - "tools/leaderboard/**"
      - ".github/workflows/leaderboard.yml"
  workflow_dispatch:

# Coalesce bursts of merges into one refresh; never cancel a push mid-commit.
concurrency:
  group: leaderboard-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          # REFRESH_TOKEN (admin PAT/App, #417) authenticates the push to `main`;
          # falls back to GITHUB_TOKEN for the read-only --check when unset.
          token: ${{ secrets.REFRESH_TOKEN || github.token }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Detect refresh token (#417)
        id: tok
        env:
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          if [ -n "${REFRESH_TOKEN}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check for leaderboard drift (ADR-023 / ADR-036)
        id: check
        run: |
          if python3 -m tools.leaderboard --check .; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Regenerate, commit, and push on drift
        if: steps.check.outputs.stale == 'true' && steps.tok.outputs.present == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Retry-rebase (#426): all three artifact workflows can fire on the same
          # merge and push to main, so a plain push races (non-fast-forward). Each
          # attempt resets to the latest main and regenerates — the leaderboard is
          # a pure function of goals+library/index+proof-runs, and the three
          # artifacts write disjoint files — then pushes; a lost race just retries
          # onto the updated main. `[skip ci]` + the docs-only paths keep it from
          # re-firing.
          paths="docs/leaderboard.md docs/leaderboard.svg docs/metrics/community-stats.json docs/metrics/leaderboard-ui.json docs/metrics/attribution-gaps.json docs/metrics/sourcing-leaderboard.json"
          for attempt in 1 2 3 4 5; do
            git fetch --quiet origin main
            git reset --hard --quiet origin/main
            python3 -m tools.leaderboard --write .
            if git diff --quiet -- $paths; then
              echo "leaderboard already in sync with latest main — nothing to push"
              exit 0
            fi
            git add $paths
            git commit -q -m "docs: refresh leaderboard [skip ci]"
            if git push --quiet origin HEAD:main; then
              echo "pushed leaderboard refresh (attempt ${attempt})"
              exit 0
            fi
            echo "push raced on attempt ${attempt} — retrying onto updated main"
          done
          echo "::warning::could not push the leaderboard refresh after 5 attempts (persistent concurrent pushes, #426); the next push to main will refresh it"
      - name: Drift but no REFRESH_TOKEN — report only (#417)
        if: steps.check.outputs.stale == 'true' && steps.tok.outputs.present != 'true'
        run: |
          echo "::warning::leaderboard drifted but the REFRESH_TOKEN secret is unset — skipping the push to main (issue #417). Add an admin PAT/App token as the REFRESH_TOKEN secret to enable the post-merge refresh."
