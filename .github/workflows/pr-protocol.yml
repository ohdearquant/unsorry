# Protocol-compliance gate (ADR-028, ADR-061): a newly added ADR must ship with
# its spec, and an added ADR/SPEC number must not collide with one already in the
# tree (docs/protocols.md). Only ADDED files are checked, so historical unpaired
# or pre-duplicated ADRs are untouched. pull_request_target on the BASE ref (the
# trusted tool + the base ADR/spec tree); added files come from the PR API.
name: pr-protocol
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  pull-requests: read
jobs:
  protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 — base ref, never the PR head
      - name: Require a spec per added ADR and a unique ADR/SPEC number (ADR-028, ADR-061)
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/pulls/$PR/files" --paginate \
            --jq '.[] | select(.status=="added") | .filename' \
            | python3 -m tools.repo.pr_protocol check
