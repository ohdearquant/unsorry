# Drain the queued-proof backlog on a schedule (ADR-058 governor, SPEC-007-A
# dispatcher). `swarm/agent.sh --dispatch-queue` only RE-PACKAGES an
# already-locally-verified `queued/prove/*` branch into a PR (Gate A re-verifies
# every one from scratch — no soundness is trusted from the producer), and it is
# governor-capped (`UNSORRY_MAX_OPEN_PROVE_PRS` / `UNSORRY_MAX_GATE_A_IN_FLIGHT`),
# so a frequent schedule self-throttles: it dispatches only while in-flight Gate A
# work is below the cap and no-ops when full. Without this the queue drains only
# when an operator runs the dispatcher by hand — the backlog in #1909.
#
# Token: a PR opened by the default GITHUB_TOKEN does NOT trigger required
# workflows (Gate A), so it could never satisfy checks or auto-merge. The
# dispatcher therefore authenticates `gh` with the admin `REFRESH_TOKEN` PAT/App
# token (same secret the leaderboard/visualisation refreshers use, #417). When
# the secret is unset the job degrades to a report-only notice instead of opening
# un-checkable PRs.
name: queue-dispatcher

on:
  # Event-driven is the primary trigger: GitHub throttles `schedule` under load
  # (observed cron runs 1–5 h apart exactly when the backlog is deepest), so the
  # queue sat empty between runs despite ready branches. A Gate A completion frees
  # an in-flight slot, so that is precisely when the governor-capped dispatcher can
  # admit more — fire then. Completions are frequent while the swarm is active and
  # are NOT cron-throttled. The cron stays as a low-activity backstop, and the
  # concurrency group below serialises passes so bursts never double-count.
  workflow_run:
    workflows: ["gate-a"]
    types: [completed]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max branches to dispatch this run (UNSORRY_DISPATCH_LIMIT)"
        required: false
        default: "10"

# Never overlap dispatcher runs (the governor counts in-flight work; two
# concurrent passes would double-count and over-dispatch).
concurrency:
  group: queue-dispatcher
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Detect refresh token (#417)
        id: tok
        env:
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          if [ -n "${REFRESH_TOKEN}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: No REFRESH_TOKEN — report only (#417)
        if: steps.tok.outputs.present != 'true'
        run: |
          echo "::warning::REFRESH_TOKEN is unset — skipping queue dispatch. A GITHUB_TOKEN-opened PR does not trigger Gate A, so it could never merge. Add an admin PAT/App token as the REFRESH_TOKEN secret to enable the scheduled dispatcher."
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: steps.tok.outputs.present == 'true'
        with:
          ref: main # --dispatch-queue requires main checked out (require_main_checkout)
          token: ${{ secrets.REFRESH_TOKEN }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        if: steps.tok.outputs.present == 'true'
        with:
          python-version: "3.12"
      - name: Preflight — REFRESH_TOKEN can open PRs (ADR-065)
        # Fail fast with a clear message if the token lacks pull-request-write,
        # instead of attempting every dispatch and dying on opaque GraphQL
        # "Resource not accessible by personal access token (createPullRequest)".
        if: steps.tok.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: python3 -m tools.repo.doctor --check pr-token --repo "${{ github.repository }}"
      - name: Dispatch queued proofs (governor-metered)
        if: steps.tok.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          # One pass per scheduled run, dispatching up to UNSORRY_DISPATCH_LIMIT
          # branches (the cron cadence is the outer loop). UNSORRY_GOVERNOR_WAIT=0
          # makes the agent run a single dispatch pass and exit instead of looping;
          # the governor (open-PR + in-flight Gate A caps) still bounds how many
          # actually dispatch. Override the per-run cap via workflow_dispatch input.
          # NB: do NOT pass --once — it caps the pass to a single PR (documented
          # behavior), which would silently defeat UNSORRY_DISPATCH_LIMIT.
          UNSORRY_DISPATCH_LIMIT: ${{ github.event.inputs.limit || '10' }}
          UNSORRY_GOVERNOR_WAIT: "0"
        run: ./swarm/agent.sh --dispatch-queue
