# Keep the generated targets board (docs/targets.md) up to date POST-MERGE
# (ADR-036, issue #415).
#
# The board is regenerated from goals/ + library/index by
# `tools.sourcing.targets_board`. Regenerating it *in every PR* (the #377/#378
# approach) made any two concurrent goal PRs conflict on the file — during a
# proving burst a freshly-sourced batch could never land. So the board moves to
# the same post-merge model as the proofs visualisation (#395): on every push to
# `main` that could change goal state it runs `--check`, and on drift it
# regenerates and commits the board straight back to `main` as a single
# docs-only `[skip ci]` commit (the standard generated-artifact exception).
#
# Pushing the refresh to `main` needs an admin identity: the default
# GITHUB_TOKEN / github-actions[bot] cannot push to a branch protected by
# required status checks, and it cannot be granted a bypass (it is not a
# selectable actor in classic protection *or* rulesets). Because the rule has
# `enforce_admins: false`, an **admin** push bypasses the checks — so the push
# authenticates with a `REFRESH_TOKEN` secret (an admin PAT / GitHub App token,
# contents:write). When the secret is unset the workflow degrades to a
# report-only notice instead of failing red. See issue #417.

name: targets-board

on:
  push:
    branches: [main]
    paths:
      - "goals/**"
      - "library/index/**"
      - "backlog/**"
      - "tools/sourcing/targets_board.py"
      - ".github/workflows/targets-board.yml"
  workflow_dispatch:

# Coalesce bursts of merges into one refresh; never cancel a push mid-commit.
concurrency:
  group: targets-board-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          # REFRESH_TOKEN (admin PAT/App, #417) authenticates the push to `main`;
          # falls back to GITHUB_TOKEN for the read-only --check when unset.
          token: ${{ secrets.REFRESH_TOKEN || github.token }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Detect refresh token (#417)
        id: tok
        env:
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: |
          if [ -n "${REFRESH_TOKEN}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check for board drift (ADR-012 / ADR-036)
        id: check
        run: |
          if python3 -m tools.sourcing.targets_board --check .; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Regenerate, commit, and push on drift
        if: steps.check.outputs.stale == 'true' && steps.tok.outputs.present == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Retry-rebase (#426): all three artifact workflows can fire on the same
          # merge and push to main, so a plain push races (non-fast-forward). Each
          # attempt resets to the latest main and regenerates — the board is a
          # pure function of goals+library/index, and the three artifacts write
          # disjoint files — then pushes; a lost race just retries onto the
          # updated main. `[skip ci]` + the docs-only path keep it from re-firing.
          for attempt in 1 2 3 4 5; do
            git fetch --quiet origin main
            git reset --hard --quiet origin/main
            python3 -m tools.sourcing.targets_board > docs/targets.md
            if git diff --quiet -- docs/targets.md; then
              echo "board already in sync with latest main — nothing to push"
              exit 0
            fi
            git add docs/targets.md
            git commit -q -m "docs: refresh targets board [skip ci]"
            if git push --quiet origin HEAD:main; then
              echo "pushed board refresh (attempt ${attempt})"
              exit 0
            fi
            echo "push raced on attempt ${attempt} — retrying onto updated main"
          done
          echo "::warning::could not push the board refresh after 5 attempts (persistent concurrent pushes, #426); the next push to main will refresh it"
      - name: Drift but no REFRESH_TOKEN — report only (#417)
        if: steps.check.outputs.stale == 'true' && steps.tok.outputs.present != 'true'
        run: |
          echo "::warning::targets board drifted but the REFRESH_TOKEN secret is unset — skipping the push to main (issue #417). Add an admin PAT/App token as the REFRESH_TOKEN secret to enable the post-merge refresh."
