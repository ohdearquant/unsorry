name = "unsorry"
version = "0.4.0"
keywords = ["math"]
defaultTargets = ["UnsorryLibrary", "UnsorryGoals"]

[leanOptions]
pp.unicode.fun = true
autoImplicit = false
relaxedAutoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0"

# The verified library: zero-sorry bar (built with --wfail in Gate A).
[[lean_lib]]
name = "UnsorryLibrary"
srcDir = "library"
globs = ["Unsorry.+"]

# Open goals: sorries expected; audited with whitelist ∪ {sorryAx}.
[[lean_lib]]
name = "UnsorryGoals"
srcDir = "."
globs = ["goals.+"]

# Adversarial fixtures for the audit's own tests (SPEC-006-A). Never in
# defaultTargets, never imported by UnsorryLibrary.
[[lean_lib]]
name = "AuditFixtures"
srcDir = "."
globs = ["AuditFixtures.+"]

[[lean_exe]]
name = "axiom_audit"
root = "AxiomAudit.Main"
supportInterpreter = true
